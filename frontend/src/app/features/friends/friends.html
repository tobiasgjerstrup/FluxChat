<button class="button" (click)="showAddFriendModal = true">Add friends!</button>
@if (showAddFriendModal) {
    <app-modal (closed)="closeAddFriendModal()">
        <app-add-friend></app-add-friend>
    </app-modal>
}
@for (friend of friends(); track friend.id) {
    <div class="friend">
        {{ friend.username }}
        @if (friend.status === 'pending') {
            @if (friend.relation_type === 'incoming') {
                <button class="button" (click)="acceptFriendRequest(friend.id)">Accept</button>
                <button class="button" (click)="rejectFriendRequest(friend.id)">Reject</button>
            } @else if (friend.relation_type === 'outgoing') {
                <button class="button" (click)="removeFriend(friend.id)">Cancel</button>
            }
        } @else if (friend.status === 'accepted') {
            <button class="button" (click)="removeFriend(friend.id)">Remove</button>
        }
    </div>
}
